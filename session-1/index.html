<title>Session 1 · Assignments</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1d212b; --border:#2a2f3a;
    --text:#e6e8ee; --muted:#9aa2b1; --accent:#3a86ff;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; padding:40px 20px; background:var(--bg); color:var(--text);

  .item{
    display:flex; align-items:center; gap:14px;
    background:var(--panel); border:1px solid var(--border); border-radius:10px;
    padding:16px 18px; cursor:pointer; text-align:left;
    font-family:inherit; color:var(--text); text-decoration:none;
  }
  .item:hover{background:var(--panel2); border-color:var(--accent);}
  .item:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}
  .tag{
    flex-shrink:0; font-size:12px; font-weight:700; color:var(--accent);
    font-family:ui-monospace,monospace; min-width:44px;
  }
  .label{font-size:14.5px; line-height:1.4;}
  .arrow{margin-left:auto; color:var(--muted); flex-shrink:0;}
